<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>חידון משקיעים</title>

  <!-- Fonts: Rubik (titles) + Assistant (body) -->
  <link href="https://fonts.googleapis.com/css2?family=Rubik:wght@400;500;600;700&family=Assistant:wght@400;600;700&display=swap" rel="stylesheet">

  <!-- Supabase CDN -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <style>
    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: 'Assistant', sans-serif;
      background-color: #0b4a64;
      color: #fefefe;
      direction: rtl;
      text-align: right;
      display: flex;
      justify-content: center;
      align-items: flex-start;
      padding: 2rem 1rem;
    }

    /* ── Card ── */
    .quiz-card {
      width: 100%;
      max-width: 680px;
      background: #0c3d52;
      border-radius: 20px;
      padding: 2.5rem 2rem;
      border: 1px solid rgba(179, 224, 220, 0.12);
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
    }

    /* ── Header & Progress ── */
    .header-stats {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 1.25rem;
      font-size: 0.9rem;
      color: rgba(254, 254, 254, 0.6);
      font-weight: 600;
    }

    .score-pill {
      background: rgba(179, 224, 220, 0.15);
      color: #b3e0dc;
      padding: 5px 14px;
      border-radius: 50px;
      border: 1px solid rgba(179, 224, 220, 0.3);
      transition: transform 0.25s ease;
    }

    .progress-container {
      width: 100%;
      height: 7px;
      background: rgba(255, 255, 255, 0.1);
      border-radius: 20px;
      margin-bottom: 2rem;
      overflow: hidden;
    }

    .progress-bar {
      height: 100%;
      background: #b3e0dc;
      width: 0%;
      border-radius: 20px;
      transition: width 0.5s ease;
    }

    /* ── Question ── */
    .question-text {
      font-family: 'Rubik', sans-serif;
      font-size: 1.2rem;
      font-weight: 600;
      line-height: 1.65;
      color: #fefefe;
      margin-bottom: 1.75rem;
      direction: rtl;
      text-align: right;
    }

    /* ── Options ── */
    .options-grid {
      display: flex;
      flex-direction: column;
      gap: 0.75rem;
    }

    .option-btn {
      background: rgba(255, 255, 255, 0.07);
      border: 1px solid rgba(179, 224, 220, 0.25);
      color: #fefefe;
      padding: 1rem 1.25rem;
      border-radius: 12px;
      font-family: 'Assistant', sans-serif;
      font-size: 1rem;
      font-weight: 600;
      text-align: right;
      direction: rtl;
      cursor: pointer;
      transition: background 0.2s ease, border-color 0.2s ease, transform 0.15s ease;
      line-height: 1.45;
      width: 100%;
    }

    .option-btn:hover:not(:disabled) {
      background: rgba(179, 224, 220, 0.15);
      border-color: #b3e0dc;
      transform: translateY(-2px);
    }

    .option-btn.selected {
      background: rgba(179, 224, 220, 0.2);
      border-color: #b3e0dc;
      color: #b3e0dc;
      font-weight: 700;
    }

    .option-btn.correct {
      background: rgba(179, 224, 220, 0.2);
      border-color: #b3e0dc;
      color: #b3e0dc;
      font-weight: 700;
    }

    .option-btn.wrong {
      background: rgba(229, 115, 115, 0.15);
      border-color: #e57373;
      color: #e57373;
      font-weight: 700;
    }

    .option-btn:disabled { cursor: default; }
    .option-btn:disabled:not(.correct):not(.wrong) { opacity: 0.35; }

    /* ── Actions ── */
    .actions-area {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-top: 2rem;
      gap: 1rem;
    }

    .action-btn {
      padding: 0.85rem 1.75rem;
      border-radius: 10px;
      font-family: 'Rubik', sans-serif;
      font-weight: 700;
      font-size: 1rem;
      border: none;
      cursor: pointer;
      transition: transform 0.15s ease, box-shadow 0.15s ease;
    }

    .btn-submit {
      background: #b3e0dc;
      color: #0c3d52;
      font-weight: 700;
    }

    .btn-submit:hover:not(:disabled) {
      transform: translateY(-2px);
      box-shadow: 0 6px 20px rgba(179, 224, 220, 0.3);
    }

    .btn-submit:disabled {
      background: rgba(255, 255, 255, 0.1);
      color: rgba(254, 254, 254, 0.3);
      cursor: not-allowed;
    }

    .btn-hint {
      background: transparent;
      color: #b3e0dc;
      display: flex;
      align-items: center;
      gap: 0.5rem;
      padding: 0.75rem 1.25rem;
      border: 1px solid #b3e0dc;
      border-radius: 10px;
    }

    .btn-hint:hover {
      background: rgba(179, 224, 220, 0.1);
      transform: translateY(-1px);
    }

    /* ── Panels ── */
    .glass-panel {
      margin-top: 1.25rem;
      padding: 1.25rem 1.5rem;
      border-radius: 12px;
      display: none;
      animation: slideUp 0.35s ease forwards;
      direction: rtl;
      text-align: right;
    }

    .glass-panel.hint {
      background: rgba(179, 224, 220, 0.1);
      border-right: 3px solid #b3e0dc;
      color: rgba(254, 254, 254, 0.85);
    }

    .glass-panel.explanation.success {
      background: rgba(179, 224, 220, 0.08);
      border-right: 3px solid #b3e0dc;
    }

    .glass-panel.explanation.error {
      background: rgba(229, 115, 115, 0.08);
      border-right: 3px solid #e57373;
    }

    .exp-title {
      font-family: 'Rubik', sans-serif;
      font-weight: 700;
      margin-bottom: 0.5rem;
      font-size: 1rem;
      color: #fefefe;
    }

    .exp-text {
      line-height: 1.65;
      color: rgba(254, 254, 254, 0.8);
      font-size: 0.95rem;
    }

    /* ── Results screen ── */
    .results-screen {
      text-align: center;
      display: none;
      animation: slideUp 0.5s ease;
      direction: rtl;
    }

    .results-screen h2 {
      font-family: 'Rubik', sans-serif;
      font-size: 1.9rem;
      font-weight: 700;
      color: #b3e0dc;
      margin-bottom: 0.5rem;
    }

    .final-score {
      font-family: 'Rubik', sans-serif;
      font-size: 4rem;
      font-weight: 700;
      color: #fefefe;
      margin: 1.25rem 0;
    }

    .btn-save {
      width: 100%;
      margin-top: 1.5rem;
      font-size: 1.1rem;
      padding: 1.1rem;
    }

    @keyframes slideUp {
      from { opacity: 0; transform: translateY(16px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .hidden { display: none !important; }

    @media (max-width: 600px) {
      .quiz-card { padding: 1.75rem 1.25rem; }
      .question-text { font-size: 1.05rem; }
      .actions-area { flex-direction: column-reverse; }
      .action-btn { width: 100%; justify-content: center; }
    }
  </style>
</head>
<body>

  <div class="quiz-card">

    <!-- מסך החידון -->
    <div id="quiz-active">
      <div class="header-stats">
        <div>שאלה <span id="current-q">1</span> מתוך <span id="total-q">-</span></div>
        <div class="score-pill">ניקוד: <span id="score-display">0</span></div>
      </div>
      <div class="progress-container">
        <div class="progress-bar" id="progress-bar"></div>
      </div>

      <div class="question-text" id="question-text">טוען נתונים...</div>

      <div class="options-grid" id="options-container"></div>

      <div class="glass-panel hint" id="hint-panel">
        <div class="exp-title">💡 רמז בשבילך:</div>
        <div class="exp-text" id="hint-text"></div>
      </div>

      <div class="glass-panel explanation" id="explanation-panel">
        <div class="exp-title" id="exp-title"></div>
        <div class="exp-text" id="exp-text"></div>
      </div>

      <div class="actions-area">
        <button class="action-btn btn-hint" id="btn-hint" onclick="showHint()">
          <svg width="18" height="18" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9.663 17h4.673M12 3v1m6.364 1.636l-.707.707M21 12h-1M4 12H3m3.343-5.657l-.707-.707m2.828 9.9a5 5 0 117.072 0l-.548.547A3.374 3.374 0 0014 18.469V19a2 2 0 11-4 0v-.531c0-.895-.356-1.754-.988-2.386l-.548-.547z"></path></svg>
          רמז (5 נק')
        </button>
        <button class="action-btn btn-submit" id="btn-submit" onclick="handleSubmit()" disabled>
          בדוק תשובה
        </button>
      </div>
    </div>

    <!-- מסך סיום -->
    <div id="quiz-results" class="results-screen">
      <h2>סיימת את הפרק! 🎉</h2>
      <p style="color: rgba(254,254,254,0.65); font-size: 1rem;">הנה הציון הסופי שלך:</p>

      <div class="final-score" id="final-score-text">0</div>

      <p id="supabase-status" style="color: #b3e0dc; font-size: 0.9rem; margin-top: 0.75rem;"></p>

      <button class="action-btn btn-submit btn-save" id="btn-save" onclick="saveResultsToSupabase()">
        שמור הישגים לפרופיל
      </button>
    </div>

  </div>

  <script>
    // Supabase
    const supabaseClient = window.supabase.createClient(
      'https://pmlkhkagtorhlteplvak.supabase.co',
      'sb_publishable_tV2FY5_h6ba6-nhdVbENLQ_gkejPX38'
    );

    // Read chapter from URL: ?chapter=1 or ?chapter=2
    const chapter = new URLSearchParams(window.location.search).get('chapter') || '1';

    let quizData = [];
    let currentIndex = 0;
    let score = 0;
    let selectedIndex = null;
    let state = 'answering'; // answering | reviewing
    const POINTS_PER_Q = 10;
    const HINT_PENALTY = 5;

    const DOM = {
      activeView: document.getElementById('quiz-active'),
      resultsView: document.getElementById('quiz-results'),
      qText: document.getElementById('question-text'),
      options: document.getElementById('options-container'),
      progress: document.getElementById('progress-bar'),
      currentQ: document.getElementById('current-q'),
      totalQ: document.getElementById('total-q'),
      score: document.getElementById('score-display'),
      btnSubmit: document.getElementById('btn-submit'),
      btnHint: document.getElementById('btn-hint'),
      hintPanel: document.getElementById('hint-panel'),
      hintText: document.getElementById('hint-text'),
      expPanel: document.getElementById('explanation-panel'),
      expTitle: document.getElementById('exp-title'),
      expText: document.getElementById('exp-text')
    };

    function initQuiz() {
      fetch(`/investor-academy/lessons/quiz-chapter-${chapter}.json`)
        .then(res => {
          if (!res.ok) throw new Error(`HTTP ${res.status}`);
          return res.json();
        })
        .then(data => {
          quizData = data.questions;
          DOM.totalQ.textContent = quizData.length;
          loadQuestion();
        })
        .catch(err => {
          console.error('Quiz load error:', err);
          document.getElementById('quiz-active').innerHTML =
            '<p style="color:#e57373;font-family:Assistant,sans-serif;text-align:center;padding:2rem">שגיאה בטעינת הבוחן</p>';
        });
    }

    function loadQuestion() {
      const q = quizData[currentIndex];
      state = 'answering';
      selectedIndex = null;

      DOM.options.innerHTML = '';
      DOM.expPanel.style.display = 'none';
      DOM.hintPanel.style.display = 'none';
      DOM.btnHint.style.display = 'flex';
      DOM.btnSubmit.textContent = 'בדוק תשובה';
      DOM.btnSubmit.disabled = true;

      DOM.currentQ.textContent = currentIndex + 1;
      DOM.progress.style.width = `${(currentIndex / quizData.length) * 100}%`;

      DOM.qText.textContent = q.question;
      DOM.hintText.textContent = q.hint;

      q.options.forEach((opt, index) => {
        const btn = document.createElement('button');
        btn.className = 'option-btn';
        btn.textContent = opt.replace(/^[A-D]\.\s*/, '');
        btn.onclick = () => selectOption(index, btn);
        DOM.options.appendChild(btn);
      });
    }

    function selectOption(index, btn) {
      if (state !== 'answering') return;
      selectedIndex = index;
      Array.from(DOM.options.children).forEach(b => b.classList.remove('selected'));
      btn.classList.add('selected');
      DOM.btnSubmit.disabled = false;
    }

    function showHint() {
      DOM.hintPanel.style.display = 'block';
      DOM.btnHint.style.display = 'none';
      score = Math.max(0, score - HINT_PENALTY);
      DOM.score.textContent = score;
    }

    function handleSubmit() {
      if (state === 'answering') checkAnswer();
      else nextQuestion();
    }

    function checkAnswer() {
      state = 'reviewing';
      const q = quizData[currentIndex];
      const isCorrect = selectedIndex === q.correct;
      const buttons = Array.from(DOM.options.children);

      buttons.forEach((btn, idx) => {
        btn.disabled = true;
        if (idx === q.correct) btn.classList.add('correct');
        else if (idx === selectedIndex && !isCorrect) btn.classList.add('wrong');
      });

      if (isCorrect) {
        score += POINTS_PER_Q;
        DOM.score.textContent = score;
        DOM.score.parentElement.style.transform = 'scale(1.1)';
        setTimeout(() => DOM.score.parentElement.style.transform = 'scale(1)', 300);

        DOM.expPanel.className = 'glass-panel explanation success';
        DOM.expTitle.innerHTML = '✨ תשובה נכונה!';
        DOM.expText.innerHTML = q.explanations[selectedIndex];
      } else {
        DOM.expPanel.className = 'glass-panel explanation error';
        DOM.expTitle.innerHTML = '❌ לא מדויק...';
        DOM.expText.innerHTML = `
          <div style="margin-bottom:8px">${q.explanations[selectedIndex]}</div>
          <strong style="color:#b3e0dc">התשובה הנכונה:</strong><br>
          <span style="color:rgba(254,254,254,0.9)">${q.explanations[q.correct]}</span>
        `;
      }

      DOM.expPanel.style.display = 'block';
      DOM.btnHint.style.display = 'none';

      const isLast = currentIndex === quizData.length - 1;
      DOM.btnSubmit.textContent = isLast ? 'סיים מבחן ➔' : 'לשאלה הבאה ➔';
    }

    function nextQuestion() {
      currentIndex++;
      if (currentIndex < quizData.length) loadQuestion();
      else finishQuiz();
    }

    function finishQuiz() {
      DOM.progress.style.width = '100%';
      DOM.activeView.classList.add('hidden');
      DOM.resultsView.style.display = 'block';
      const maxScore = quizData.length * POINTS_PER_Q;
      document.getElementById('final-score-text').textContent = `${score} / ${maxScore}`;
    }

    async function saveResultsToSupabase() {
      const btnSave = document.getElementById('btn-save');
      const statusTxt = document.getElementById('supabase-status');
      btnSave.disabled = true;
      btnSave.textContent = 'טוען...';

      try {
        const { data: { user } } = await supabaseClient.auth.getUser();

        const { error } = await supabaseClient
          .from('quiz_results')
          .insert([{
            user_id: user ? user.id : null,
            chapter: parseInt(chapter, 10),
            score: score,
            max_score: quizData.length * POINTS_PER_Q
          }]);

        if (error) throw error;

        btnSave.textContent = '✔️ נשמר בהצלחה!';
        btnSave.style.background = 'rgba(179,224,220,0.25)';
        btnSave.style.color = '#b3e0dc';
      } catch (err) {
        console.error(err);
        statusTxt.textContent = 'שגיאה: ' + err.message;
        btnSave.disabled = false;
        btnSave.textContent = 'נסה שוב';
      }
    }

    function postHeight() {
      window.parent.postMessage(
        { type: 'quizHeight', height: document.body.scrollHeight },
        '*'
      );
    }

    // Re-post whenever layout changes (e.g. fonts load, images render)
    new ResizeObserver(postHeight).observe(document.body);

    window.addEventListener('DOMContentLoaded', initQuiz);
  </script>
</body>
</html>
