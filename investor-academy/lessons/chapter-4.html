document.getElementById('signout-btn').addEventListener('click', async function () {
    const _c = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    window.location.replace('/auth/login/');
});
(function () {
    var btn = document.getElementById('hbnav-toggle');
    var panel = document.getElementById('hbnav-panel');
    var overlay = document.getElementById('hbnav-overlay');
    function open()  { btn.classList.add('open'); panel.classList.add('open'); overlay.classList.add('open'); btn.setAttribute('aria-expanded','true'); }
    function close() { btn.classList.remove('open'); panel.classList.remove('open'); overlay.classList.remove('open'); btn.setAttribute('aria-expanded','false'); }
    btn.addEventListener('click', function () { panel.classList.contains('open') ? close() : open(); });
    overlay.addEventListener('click', close);
    document.addEventListener('keydown', function (e) { if (e.key === 'Escape') close(); });
})();
</script>
