<!DOCTYPE html>
<html dir="rtl" lang="he">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>לוח בקרה — NewGen Finance</title>
  <link href="https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
  <style>
    :root {
      --font: 'Heebo', sans-serif;
      --bg: linear-gradient(155deg, #0b4a64 0%, #1680a0 48%, #0d6a82 100%);
      --card-bg: #ece8e5;
      --teal: #5e817d;
      --teal-dark: #4a6b67;
      --text-dark: #394140;
      --text-mid: #6b7d7c;
      --text-light: #fefefe;
      --text-sub: rgba(254,254,254,0.7);
      --shadow: 0 4px 20px rgba(0,0,0,0.15);
      --radius: 14px;
      --tr: 0.2s ease;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }

    body {
      font-family: var(--font);
      background: var(--bg);
      background-attachment: fixed;
      color: var(--text-light);
      direction: rtl;
      min-height: 100vh;
      -webkit-font-smoothing: antialiased;
    }

    a { text-decoration: none; color: inherit; }

    /* ── Navbar ── */
    .navbar {
      position: sticky; top: 0; z-index: 100;
      display: flex; align-items: center; justify-content: space-between;
      padding: 0 clamp(20px, 5vw, 60px);
      height: 64px;
      background: rgba(12,61,82,0.97);
      backdrop-filter: blur(16px);
      border-bottom: 1px solid rgba(255,255,255,0.08);
    }

    .logo { font-size: 1.2rem; font-weight: 800; direction: ltr; }
    .logo span { color: var(--teal); }
    .nav-badge {
      font-size: 0.75rem; font-weight: 700;
      background: var(--teal); color: #fff;
      padding: 3px 10px; border-radius: 20px;
    }

    /* ── Lock screen ── */
    #lock-screen {
      display: flex; align-items: center; justify-content: center;
      min-height: calc(100vh - 64px); padding: 24px;
    }

    .lock-card {
      background: var(--card-bg); border-radius: var(--radius);
      padding: 44px 48px; max-width: 380px; width: 100%;
      box-shadow: var(--shadow); color: var(--text-dark); text-align: center;
    }

    .lock-icon { font-size: 2.8rem; margin-bottom: 16px; }
    .lock-title { font-size: 1.3rem; font-weight: 800; margin-bottom: 8px; }
    .lock-sub { font-size: 0.9rem; color: var(--text-mid); margin-bottom: 28px; }

    .lock-input {
      width: 100%; padding: 12px 14px;
      border: 1.5px solid #c8c4c1; border-radius: 10px;
      font-family: var(--font); font-size: 1rem; color: var(--text-dark);
      background: #f4f0ed; direction: ltr; text-align: center;
      outline: none; margin-bottom: 14px;
      transition: border-color var(--tr), box-shadow var(--tr);
    }
    .lock-input:focus { border-color: var(--teal); box-shadow: 0 0 0 3px rgba(94,129,125,0.15); }

    .lock-btn {
      width: 100%; padding: 13px;
      background: var(--teal); color: #fff; border: none;
      border-radius: 10px; font-family: var(--font);
      font-size: 1rem; font-weight: 700; cursor: pointer;
      transition: background var(--tr);
    }
    .lock-btn:hover { background: var(--teal-dark); }

    .lock-error {
      display: none; margin-top: 12px;
      font-size: 0.875rem; color: #c0392b; font-weight: 600;
    }

    /* ── Main dashboard ── */
    #dashboard { display: none; }

    .page-wrap {
      padding: clamp(32px,5vw,56px) clamp(20px,5vw,60px) 80px;
      max-width: 1100px; margin: 0 auto;
    }

    .page-title {
      font-size: clamp(1.5rem,3vw,2rem); font-weight: 900;
      margin-bottom: 28px; letter-spacing: -0.4px;
    }

    /* ── Stats ── */
    .stats-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 16px; margin-bottom: 32px;
    }

    .stat-card {
      background: var(--card-bg); border-radius: var(--radius);
      padding: 22px 24px; box-shadow: var(--shadow); color: var(--text-dark);
    }

    .stat-label {
      font-size: 0.8rem; font-weight: 600;
      color: var(--text-mid); margin-bottom: 8px;
    }

    .stat-value {
      font-size: 2rem; font-weight: 900; color: var(--text-dark); line-height: 1;
    }

    /* ── Section header ── */
    .section-title {
      font-size: 1.05rem; font-weight: 800;
      margin-bottom: 14px; color: var(--text-light);
      display: flex; align-items: center; gap: 10px;
    }

    /* ── Table card ── */
    .table-card {
      background: var(--card-bg); border-radius: var(--radius);
      box-shadow: var(--shadow); overflow: hidden; margin-bottom: 32px;
    }

    table { width: 100%; border-collapse: collapse; }

    thead tr { background: #dedad7; }
    thead th {
      padding: 13px 16px; font-size: 0.8rem; font-weight: 700;
      color: var(--text-mid); text-align: right; white-space: nowrap;
    }

    tbody tr { border-top: 1px solid #e0dbd7; transition: background var(--tr); }
    tbody tr:hover { background: #f5f2ef; }

    tbody td {
      padding: 12px 16px; font-size: 0.88rem;
      color: var(--text-dark); vertical-align: middle;
    }

    .td-wrap { max-width: 200px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

    /* ── Status badge ── */
    .badge {
      display: inline-block; padding: 3px 10px;
      border-radius: 20px; font-size: 0.75rem; font-weight: 700;
    }
    .badge-pending  { background: #fff3cd; color: #856404; }
    .badge-approved { background: #d1f0e0; color: #1b7a55; }
    .badge-denied   { background: #ffe5e5; color: #c0392b; }
    .badge-access   { background: #d1f0e0; color: #1b7a55; }
    .badge-no-access { background: #ffe5e5; color: #c0392b; }

    /* ── Action buttons ── */
    .btn-approve, .btn-deny, .btn-toggle {
      font-family: var(--font); font-size: 0.8rem; font-weight: 700;
      padding: 6px 14px; border-radius: 8px; cursor: pointer;
      border: none; transition: opacity var(--tr), transform var(--tr);
      white-space: nowrap;
    }
    .btn-approve:hover, .btn-deny:hover, .btn-toggle:hover { opacity: 0.85; transform: translateY(-1px); }
    .btn-approve:disabled, .btn-deny:disabled, .btn-toggle:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

    .btn-approve { background: #2ecc71; color: #fff; margin-left: 6px; }
    .btn-deny    { background: #e74c3c; color: #fff; }
    .btn-toggle  { background: var(--teal); color: #fff; }
    .btn-toggle.revoke { background: #c0392b; }

    .empty-row td {
      text-align: center; padding: 32px;
      font-size: 0.9rem; color: var(--text-mid); font-style: italic;
    }

    /* ── Responsive ── */
    @media (max-width: 700px) {
      .stats-grid { grid-template-columns: repeat(2, 1fr); }
      .hide-mobile { display: none; }
    }
    @media (max-width: 420px) {
      .stats-grid { grid-template-columns: 1fr 1fr; }
    }
  </style>
</head>
<body>

  <nav class="navbar">
    <span class="logo">NewGen <span>Finance</span></span>
    <span class="nav-badge">Admin</span>
  </nav>

  <!-- Lock screen -->
  <div id="lock-screen">
    <div class="lock-card">
      <div class="lock-icon">🔐</div>
      <div class="lock-title">כניסה לדשבורד</div>
      <div class="lock-sub">הזן סיסמת מנהל כדי להמשיך</div>
      <input type="password" class="lock-input" id="admin-password" placeholder="סיסמה" autocomplete="current-password">
      <button class="lock-btn" id="admin-login-btn">כנס</button>
      <div class="lock-error" id="lock-error">סיסמה שגויה — נסה שוב</div>
    </div>
  </div>

  <!-- Dashboard (hidden until authenticated) -->
  <div id="dashboard">
    <div class="page-wrap">
      <h1 class="page-title">לוח בקרה</h1>

      <!-- Stats -->
      <div class="stats-grid">
        <div class="stat-card">
          <div class="stat-label">סה"כ משתמשים</div>
          <div class="stat-value" id="stat-total">—</div>
        </div>
        <div class="stat-card">
          <div class="stat-label">משתמשים פעילים</div>
          <div class="stat-value" id="stat-active">—</div>
        </div>
        <div class="stat-card">
          <div class="stat-label">בקשות ממתינות</div>
          <div class="stat-value" id="stat-pending">—</div>
        </div>
        <div class="stat-card">
          <div class="stat-label">בקשות שאושרו</div>
          <div class="stat-value" id="stat-approved">—</div>
        </div>
      </div>

      <!-- Access requests -->
      <div class="section-title">
        📋 בקשות גישה ממתינות
        <span id="pending-badge" style="background:#e74c3c;color:#fff;font-size:0.72rem;font-weight:700;padding:2px 9px;border-radius:20px;display:none;"></span>
      </div>
      <div class="table-card">
        <table>
          <thead>
            <tr>
              <th>תאריך</th>
              <th>שם</th>
              <th>אימייל</th>
              <th class="hide-mobile">טלפון</th>
              <th class="hide-mobile">הודעה</th>
              <th>פעולות</th>
            </tr>
          </thead>
          <tbody id="requests-tbody">
            <tr class="empty-row"><td colspan="7">טוען...</td></tr>
          </tbody>
        </table>
      </div>

      <!-- All users -->
      <div class="section-title" style="justify-content:space-between;">
        <span>👥 כל המשתמשים</span>
        <label style="font-size:0.8rem;font-weight:600;cursor:pointer;display:flex;align-items:center;gap:6px;">
          <input type="checkbox" id="show-all-users" style="cursor:pointer;">
          הסתר פעילים
        </label>
      </div>
      <div class="table-card">
        <table>
          <thead>
            <tr>
              <th>תאריך הצטרפות</th>
              <th>שם</th>
              <th>אימייל</th>
              <th>סטטוס גישה</th>
              <th>פעולה</th>
            </tr>
          </thead>
          <tbody id="users-tbody">
            <tr class="empty-row"><td colspan="5">טוען...</td></tr>
          </tbody>
        </table>
      </div>
    </div>
  </div>

  <!-- Supabase CDN -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
  <script src="/assets/js/supabase-config.js"></script>
  <script>
  (function () {
    var ADMIN_PASSWORD = 'Jessie123!';

    var _sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    function getStoredToken() { return sessionStorage.getItem('admin_authenticated'); }

    // ── Login flow ──
    document.getElementById('admin-login-btn').addEventListener('click', attemptLogin);
    document.getElementById('admin-password').addEventListener('keydown', function (e) {
      if (e.key === 'Enter') attemptLogin();
    });

    function attemptLogin() {
      var pw = document.getElementById('admin-password').value;
      if (pw === ADMIN_PASSWORD) {
        sessionStorage.setItem('admin_authenticated', 'true');
        showDashboard();
      } else {
        document.getElementById('lock-error').style.display = 'block';
      }
    }

    // ── Bootstrap ──
    if (getStoredToken() === 'true') { showDashboard(); }

    // ── Dashboard ──
    function showDashboard() {
      document.getElementById('lock-screen').style.display = 'none';
      document.getElementById('dashboard').style.display = 'block';
      loadData();
    }

    function fmtDate(iso) {
      if (!iso) return '—';
      return new Date(iso).toLocaleDateString('he-IL', { day: '2-digit', month: '2-digit', year: '2-digit' });
    }

    function esc(s) {
      return String(s || '')
        .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
    }

    async function loadData() {
      try {
        // Parallel queries
        var [profilesRes, requestsRes] = await Promise.all([
          _sb.from('profiles').select('*').order('created_at', { ascending: false }),
          _sb.from('access_requests').select('*').order('created_at', { ascending: false }),
        ]);

        var profiles = profilesRes.data || [];
        var requests = requestsRes.data || [];

        // ── Stats ──
        var pendingCount  = requests.filter(function (r) { return r.status === 'pending'; }).length;
        var approvedCount = requests.filter(function (r) { return r.status === 'approved'; }).length;
        document.getElementById('stat-total').textContent    = profiles.length;
        document.getElementById('stat-active').textContent   = profiles.filter(function (p) { return p.has_access; }).length;
        document.getElementById('stat-pending').textContent  = pendingCount;
        document.getElementById('stat-approved').textContent = approvedCount;

        // ── Pending badge ──
        var badge = document.getElementById('pending-badge');
        if (pendingCount > 0) {
          badge.textContent = pendingCount;
          badge.style.display = 'inline-block';
        }

        // ── Requests table — show pending only ──
        var pendingRequests = requests.filter(function (r) { return r.status === 'pending'; });
        renderRequests(pendingRequests);

        // ── Users table — show all by default ──
        window._allProfiles = profiles;
        renderUsers(profiles);

        document.getElementById('show-all-users').addEventListener('change', function () {
          renderUsers(this.checked ? profiles.filter(function (p) { return !p.has_access; }) : profiles);
        });

      } catch (err) {
        console.error('loadData error:', err);
      }
    }

    // ── Requests table (pending only) ──
    function renderRequests(requests) {
      var tbody = document.getElementById('requests-tbody');
      if (!requests.length) {
        tbody.innerHTML = '<tr class="empty-row"><td colspan="6">אין בקשות ממתינות</td></tr>';
        return;
      }
      tbody.innerHTML = requests.map(function (r, i) {
        return '<tr id="req-row-' + i + '">' +
          '<td>' + fmtDate(r.created_at) + '</td>' +
          '<td class="td-wrap">' + esc(r.name) + '</td>' +
          '<td class="td-wrap">' + esc(r.email) + '</td>' +
          '<td class="hide-mobile td-wrap">' + esc(r.phone) + '</td>' +
          '<td class="hide-mobile td-wrap" title="' + esc(r.message) + '">' + esc(r.message) + '</td>' +
          '<td id="req-actions-' + i + '">' +
            '<button class="btn-approve" onclick="approveRequest(\'' + esc(r.user_id) + '\',' + i + ',this)">אשר גישה</button>' +
            '<button class="btn-deny"    onclick="denyRequest(\''    + esc(r.user_id) + '\',' + i + ',this)">דחה</button>' +
          '</td>' +
          '</tr>';
      }).join('');
    }

    function decrementPendingBadge() {
      var badge = document.getElementById('pending-badge');
      var n = Math.max(0, parseInt(badge.textContent || '0') - 1);
      badge.textContent = n;
      if (n === 0) badge.style.display = 'none';
    }

    // ── Users table ──
    function renderUsers(profiles) {
      var tbody = document.getElementById('users-tbody');
      if (!profiles.length) {
        tbody.innerHTML = '<tr class="empty-row"><td colspan="5">אין משתמשים עדיין</td></tr>';
        return;
      }
      tbody.innerHTML = profiles.map(function (p, i) {
        var hasAccess = !!p.has_access;
        return '<tr id="user-row-' + i + '">' +
          '<td>' + fmtDate(p.created_at) + '</td>' +
          '<td class="td-wrap">' + esc(p.full_name) + '</td>' +
          '<td class="td-wrap">' + esc(p.email || '—') + '</td>' +
          '<td><span class="badge ' + (hasAccess ? 'badge-access' : 'badge-no-access') + '" id="user-badge-' + i + '">' +
            (hasAccess ? 'יש גישה' : 'אין גישה') + '</span></td>' +
          '<td><button class="btn-toggle' + (hasAccess ? ' revoke' : '') + '" id="user-toggle-' + i + '" ' +
            'onclick="toggleAccess(\'' + esc(p.id) + '\',' + i + ',' + hasAccess + ')">' +
            (hasAccess ? 'שלול גישה' : 'הענק גישה') + '</button></td>' +
          '</tr>';
      }).join('');
    }

    // ── API calls ──
    async function callManageAccess(payload) {
      var res = await fetch('/api/manage-access', {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'x-admin-token': ADMIN_PASSWORD,
        },
        body: JSON.stringify(payload),
      });
      if (!res.ok) throw new Error('API error: ' + res.status);
      return res.json();
    }

    window.approveRequest = async function (userId, idx, btn) {
      btn.disabled = true;
      try {
        await callManageAccess({ userId: userId, action: 'approve' });
        // Remove row
        var row = document.getElementById('req-row-' + idx);
        if (row) row.remove();
        // Update stats
        document.getElementById('stat-pending').textContent  = Math.max(0, parseInt(document.getElementById('stat-pending').textContent) - 1);
        document.getElementById('stat-approved').textContent = parseInt(document.getElementById('stat-approved').textContent) + 1;
        document.getElementById('stat-active').textContent   = parseInt(document.getElementById('stat-active').textContent) + 1;
        decrementPendingBadge();
      } catch (err) {
        console.error('approve failed:', err);
        btn.disabled = false;
        alert('שגיאה באישור הגישה: ' + err.message);
      }
    };

    window.denyRequest = async function (userId, idx, btn) {
      btn.disabled = true;
      try {
        await callManageAccess({ userId: userId, action: 'deny' });
        // Remove row
        var row = document.getElementById('req-row-' + idx);
        if (row) row.remove();
        document.getElementById('stat-pending').textContent = Math.max(0, parseInt(document.getElementById('stat-pending').textContent) - 1);
        decrementPendingBadge();
      } catch (err) {
        console.error('deny failed:', err);
        btn.disabled = false;
        alert('שגיאה בדחיית הבקשה: ' + err.message);
      }
    };

    window.toggleAccess = async function (userId, idx, currentAccess) {
      var btn = document.getElementById('user-toggle-' + idx);
      btn.disabled = true;
      var newAccess = !currentAccess;
      try {
        await callManageAccess({ userId: userId, action: 'toggle' });
        // Update badge
        var badge = document.getElementById('user-badge-' + idx);
        badge.className = 'badge ' + (newAccess ? 'badge-access' : 'badge-no-access');
        badge.textContent = newAccess ? 'יש גישה' : 'אין גישה';
        // Update button
        btn.textContent = newAccess ? 'שלול גישה' : 'הענק גישה';
        btn.className = 'btn-toggle' + (newAccess ? ' revoke' : '');
        btn.onclick = function () { window.toggleAccess(userId, idx, newAccess); };
        btn.disabled = false;
        // Update active stat
        var active = document.getElementById('stat-active');
        active.textContent = parseInt(active.textContent) + (newAccess ? 1 : -1);
      } catch (err) {
        console.error('toggle failed:', err);
        btn.disabled = false;
        alert('שגיאה בעדכון הגישה');
      }
    };
  })();
  </script>

</body>
</html>
